name: estudio-socioeconomico
region: nyc
services:
- name: web
  github:
    branch: main
    deploy_on_push: true
  build_command: pip install -r requirements.txt && python manage.py collectstatic --noinput
  run_command: gunicorn --worker-tmp-dir /dev/shm --bind 0.0.0.0:$PORT esteconom.wsgi
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  envs:
  - key: SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DEBUG
    scope: RUN_AND_BUILD_TIME
    value: "False"
  - key: ALLOWED_HOSTS
    scope: RUN_AND_BUILD_TIME
    value: "${APP_DOMAIN}"
  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: DJANGO_SETTINGS_MODULE
    scope: RUN_AND_BUILD_TIME
    value: esteconom.settings
