{% extends "base.html" %}

{% block title %}Acceso denegado{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center py-20">
  <div class="inline-flex items-center justify-center h-20 w-20 rounded-full bg-red-100 mb-6">
    <svg class="h-10 w-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    </svg>
  </div>
  <h1 class="text-3xl font-bold text-gray-900 mb-3">Acceso denegado</h1>
  <p class="text-gray-500 mb-8">
    No tienes permiso para acceder a este módulo.<br>
    Contacta al administrador del sistema si crees que esto es un error.
  </p>
  <a href="{% url 'home' %}"
     class="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-semibold text-white rounded-lg"
     style="background-color: var(--meraki-purple);"
     onmouseover="this.style.backgroundColor='var(--meraki-purple-dark)'"
     onmouseout="this.style.backgroundColor='var(--meraki-purple)'">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
    </svg>
    Ir al inicio
  </a>
</div>
{% endblock %}
