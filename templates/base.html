<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Estudio Socioeconómico{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="text-xl font-bold text-indigo-600">Estudio Socioeconómico</a>
                <div>
                    {% if user.is_authenticated %}
                        <span class="text-gray-700 mr-4">{{ user.get_full_name|default:user.username }}</span>
                        <a href="{% url 'logout' %}" class="text-sm text-red-600 hover:text-red-800 font-medium">Cerrar sesión</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium">Iniciar sesión</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t mt-auto py-4 text-center text-sm text-gray-500">
        Proyecto Meraki &copy; 2026
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
