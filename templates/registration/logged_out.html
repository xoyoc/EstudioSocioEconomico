{% extends "base.html" %}

{% block title %}Sesión cerrada — Estudio Socioeconómico{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-8rem)]">
    <div class="w-full max-w-md">
        <div class="bg-white shadow-lg rounded-lg px-8 py-10 text-center">
            <svg class="mx-auto h-12 w-12 text-green-500 mb-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Sesión cerrada</h2>
            <p class="text-gray-600 mb-6">Has cerrado tu sesión correctamente.</p>
            <a href="{% url 'login' %}"
               class="inline-block bg-indigo-600 text-white py-2 px-6 rounded-md hover:bg-indigo-700 font-medium transition">
                Volver a iniciar sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
