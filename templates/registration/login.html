{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — EstudioEcoNom</title>
  <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
  <link rel="icon" type="image/png" href="{% static 'img/logotipo.png' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --meraki-purple: #9B8EC4;
      --meraki-purple-dark: #7B6BAF;
      --meraki-purple-light: #F0EEFA;
    }
  </style>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-xl shadow-md p-8 border-t-4 border-purple-400">
    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-3">
        <img src="{% static 'img/logotipo.png' %}" height="48" alt="Meraki Consultoría" class="h-12 w-auto">
      </div>
      <h1 class="mt-1 text-xl font-semibold text-gray-800">EstudioEcoNom</h1>
      <p class="text-xs text-gray-400 mt-1">Sistema de Estudios Socioeconómicos</p>
    </div>

    <!-- Errors -->
    {% if form.non_field_errors %}
    <div class="mb-4 px-3 py-2 bg-red-50 border border-red-200 rounded-md text-sm text-red-700">
      Usuario o contraseña incorrectos. Por favor, intenta de nuevo.
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
        <input id="id_username" name="username" type="text" required autofocus
               value="{{ form.username.value|default:'' }}"
               class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
      </div>
      <div>
        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input id="id_password" name="password" type="password" required
               class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
      </div>
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <button type="submit"
              class="w-full py-2 px-4 text-white text-sm font-semibold rounded-md transition-colors"
              style="background-color: var(--meraki-purple);"
              onmouseover="this.style.backgroundColor='var(--meraki-purple-dark)'"
              onmouseout="this.style.backgroundColor='var(--meraki-purple)'">
        Iniciar sesión
      </button>
    </form>
  </div>
</body>
</html>
