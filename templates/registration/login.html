{% extends "base.html" %}

{% block title %}Iniciar sesión — Estudio Socioeconómico{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-8rem)]">
    <div class="w-full max-w-md">
        <div class="bg-white shadow-lg rounded-lg px-8 py-10">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Iniciar sesión</h2>

            {% if form.errors %}
            <div class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded mb-6">
                <p class="text-sm">Usuario o contraseña incorrectos. Por favor, intenta de nuevo.</p>
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-5">
                    <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                    <input type="text" name="username" id="id_username" autofocus required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                           value="{{ form.username.value|default:'' }}">
                </div>

                <div class="mb-6">
                    <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" name="password" id="id_password" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <button type="submit"
                        class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 font-medium transition">
                    Iniciar sesión
                </button>

                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
            </form>
        </div>
    </div>
</div>
{% endblock %}
